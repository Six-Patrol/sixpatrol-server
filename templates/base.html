{{ define "base" }}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen flex">
      <aside class="w-64 bg-slate-900 text-white p-6">
        <div class="text-xl font-semibold tracking-wide">SixPatrol</div>
        <nav class="mt-8 space-y-3 text-sm">
          <a class="block text-slate-200 hover:text-white" href="/dashboard"
            >Overview</a
          >
          <a class="block text-slate-200 hover:text-white" href="#"
            >Telemetry</a
          >
          <a class="block text-slate-200 hover:text-white" href="#">Alerts</a>
          <a class="block text-slate-200 hover:text-white" href="#">API Keys</a>
        </nav>
      </aside>
      <main class="flex-1 p-8">{{ block "content" . }}{{ end }}</main>
    </div>
  </body>
</html>
{{ end }}
